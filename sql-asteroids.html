<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SQL Asteroids</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --accent: #00ccff;
  --accent2: #00cc88;
}
body {
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: 'Courier New', monospace;
  overflow: hidden;
}
canvas { display: block; }

/* ── START SCREEN ────────────────────────────────────────────── */
#start-screen {
  position: fixed;
  inset: 0;
  background: transparent;
  z-index: 20;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
.sp {
  position: relative;
  background: rgba(4, 0, 16, 0.88);
  border: 1px solid rgba(0,200,255,0.25);
  max-width: 720px;
  width: 94%;
  padding: 36px 44px 32px;
  box-shadow:
    0 0 0 1px rgba(0,200,255,0.06),
    0 0 60px rgba(0,150,255,0.12),
    inset 0 0 40px rgba(0,100,200,0.04);
}
.sp .c { position: absolute; width: 16px; height: 16px; border-color: var(--accent); border-style: solid; }
.sp .c.tl { top:-2px;    left:-2px;  border-width: 2px 0 0 2px; }
.sp .c.tr { top:-2px;    right:-2px; border-width: 2px 2px 0 0; }
.sp .c.bl { bottom:-2px; left:-2px;  border-width: 0 0 2px 2px; }
.sp .c.br { bottom:-2px; right:-2px; border-width: 0 2px 2px 0; }
.sp-statusbar {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  letter-spacing: 2px;
  color: rgba(0,200,255,0.45);
  border-bottom: 1px solid rgba(0,200,255,0.12);
  padding-bottom: 10px;
  margin-bottom: 28px;
}
.sp-statusbar .dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 6px var(--accent);
  margin-right: 6px;
  vertical-align: middle;
  animation: dotpulse 2s ease-in-out infinite;
}
@keyframes dotpulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.sp-title { text-align: center; margin-bottom: 4px; }
.sp-title h1 {
  font-size: 54px;
  letter-spacing: 14px;
  color: var(--accent);
  text-shadow:
    0 0 10px var(--accent),
    0 0 30px rgba(0,200,255,0.5),
    0 0 60px rgba(0,200,255,0.2);
  line-height: 1;
}
.sp-title h2 {
  font-size: 13px;
  letter-spacing: 8px;
  color: var(--accent2);
  text-shadow: 0 0 12px var(--accent2);
  margin-top: 6px;
}
.sp-divider {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 20px 0;
  color: rgba(0,200,255,0.2);
  font-size: 10px;
  letter-spacing: 3px;
}
.sp-divider::before, .sp-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,200,255,0.25), transparent);
}
.sp-cols {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 20px;
}
.sp-card {
  border: 1px solid rgba(0,200,255,0.14);
  padding: 14px 16px;
  position: relative;
}
.sp-card-label {
  position: absolute;
  top: -8px; left: 12px;
  background: rgba(4,0,16,0.95);
  padding: 0 6px;
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--accent);
}
.sp-card table { border-collapse: collapse; width: 100%; }
.sp-card td { font-size: 12px; color: #778; padding: 3px 0; line-height: 1.6; }
.sp-card td:first-child { color: var(--accent); padding-right: 12px; white-space: nowrap; }
.sp-card td.em { color: var(--accent2); }
.sp-themes-label {
  font-size: 10px;
  letter-spacing: 3px;
  color: rgba(0,200,255,0.4);
  margin-bottom: 10px;
}
.sp-themes { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 26px; }
.theme-btn {
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 4px;
  padding: 8px 12px;
  cursor: pointer;
  font-family: 'Courier New', monospace;
  font-size: 11px;
  letter-spacing: 1.5px;
  color: #556;
  transition: all 0.14s;
  display: flex;
  align-items: center;
  gap: 8px;
}
.theme-btn:hover { border-color: rgba(255,255,255,0.3); color: #aab; }
.theme-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,200,255,0.06); }
.theme-swatch { display: flex; gap: 3px; }
.theme-swatch span { display: block; width: 8px; height: 8px; border-radius: 50%; }
.sp-start { text-align: center; }
.start-btn {
  background: transparent;
  border: 1px solid var(--accent);
  color: var(--accent);
  padding: 13px 52px;
  font-size: 15px;
  font-family: 'Courier New', monospace;
  letter-spacing: 6px;
  cursor: pointer;
  text-shadow: 0 0 10px var(--accent);
  box-shadow: 0 0 20px rgba(0,200,255,0.08), inset 0 0 20px rgba(0,200,255,0.04);
  transition: box-shadow 0.14s, background 0.14s;
  animation: blink 1.5s ease-in-out infinite;
}
.start-btn:hover {
  background: rgba(0,200,255,0.06);
  box-shadow: 0 0 30px rgba(0,200,255,0.2), inset 0 0 20px rgba(0,200,255,0.08);
  animation: none;
  opacity: 1;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.5} }

/* ── QUIZ OVERLAY ────────────────────────────────────────────── */
#quiz-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 12, 0.93);
  z-index: 10;
  justify-content: center;
  align-items: center;
}
#quiz-overlay.active { display: flex; }
.quiz-box {
  background: #050510;
  border: 2px solid #00ccff;
  border-radius: 10px;
  padding: 36px 40px;
  max-width: 640px;
  width: 92%;
  box-shadow: 0 0 40px rgba(0, 200, 255, 0.2);
}
.quiz-title { color: #00ccff; font-size: 13px; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 6px; }
.quiz-context { color: #556; font-size: 12px; margin-bottom: 22px; border-bottom: 1px solid #112; padding-bottom: 14px; }
.quiz-question { color: #dde; font-size: 17px; line-height: 1.55; margin-bottom: 10px; }
.quiz-code {
  background: #0a0a18;
  border: 1px solid #223;
  border-left: 3px solid #00cc88;
  border-radius: 4px;
  padding: 12px 16px;
  margin: 10px 0 22px;
  color: #00cc88;
  font-size: 13px;
  white-space: pre;
  font-family: 'Courier New', monospace;
  overflow-x: auto;
}
.quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
.quiz-option {
  background: #08081a;
  border: 2px solid #223;
  border-radius: 6px;
  padding: 13px 15px;
  color: #aab;
  font-size: 13px;
  cursor: pointer;
  transition: border-color 0.12s, color 0.12s, background 0.12s;
  font-family: 'Courier New', monospace;
  text-align: left;
  line-height: 1.4;
}
.quiz-option:hover:not(:disabled) { border-color: #00ccff; color: #fff; background: #0c0c25; }
.quiz-option.correct { border-color: #00cc88 !important; background: #002211 !important; color: #00cc88 !important; }
.quiz-option.wrong   { border-color: #ff3355 !important; background: #1a0008 !important; color: #ff3355 !important; }
.quiz-option:disabled { cursor: default; }
.quiz-result { font-size: 15px; font-weight: bold; min-height: 22px; margin-bottom: 14px; }
.quiz-result.success { color: #00cc88; }
.quiz-result.failure { color: #ff3355; }
.quiz-continue {
  display: none;
  background: transparent;
  border: 2px solid #00ccff;
  color: #00ccff;
  padding: 10px 28px;
  font-size: 14px;
  font-family: 'Courier New', monospace;
  letter-spacing: 2px;
  cursor: pointer;
  border-radius: 5px;
  transition: background 0.12s;
}
.quiz-continue:hover { background: rgba(0,200,255,0.1); }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="start-screen">
  <div class="sp">
    <span class="c tl"></span><span class="c tr"></span>
    <span class="c bl"></span><span class="c br"></span>

    <div class="sp-statusbar">
      <span><span class="dot"></span>SYSTEM ONLINE</span>
      <span>PLAYER 01</span>
      <span>SQL ASTEROIDS v2.0</span>
    </div>

    <div class="sp-title">
      <h1>ASTEROIDS</h1>
      <h2>SQL EDITION</h2>
    </div>

    <div class="sp-divider">MISSION BRIEFING</div>

    <div class="sp-cols">
      <div class="sp-card">
        <span class="sp-card-label">CONTROLS</span>
        <table>
          <tr><td>← →</td><td>Rotate ship</td></tr>
          <tr><td>↑</td><td>Thrust forward</td></tr>
          <tr><td>SPACE</td><td>Fire cannon</td></tr>
        </table>
      </div>
      <div class="sp-card">
        <span class="sp-card-label">OBJECTIVES</span>
        <table>
          <tr><td>◈</td><td>Destroy <span class="em">10 × level</span> asteroids</td></tr>
          <tr><td>◈</td><td>Answer SQL quiz to <span class="em">advance</span></td></tr>
          <tr><td>◈</td><td>Quiz on hit = recover <span class="em">lost life</span></td></tr>
        </table>
      </div>
    </div>

    <div class="sp-themes-label">VISUAL THEME</div>
    <div class="sp-themes" id="theme-row"></div>

    <div class="sp-start">
      <button class="start-btn" onclick="startGame()">▶ &nbsp;PRESS START&nbsp; ◀</button>
    </div>
  </div>
</div>

<div id="quiz-overlay">
  <div class="quiz-box">
    <div class="quiz-title" id="quiz-title">SQL CHALLENGE</div>
    <div class="quiz-context" id="quiz-context"></div>
    <div class="quiz-question" id="quiz-question"></div>
    <div id="quiz-code" class="quiz-code" style="display:none"></div>
    <div class="quiz-options" id="quiz-options"></div>
    <div class="quiz-result" id="quiz-result"></div>
    <button class="quiz-continue" id="quiz-continue" onclick="continueAfterQuiz()">CONTINUE</button>
  </div>
</div>

<script src="sql-asteroids.js"></script>
</body>
</html>
